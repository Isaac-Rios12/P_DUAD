<!DOCTYPE html>
<html>
  <form action="https://dummyjson.com/test" method="POST">
    <h1>Formulario de Votación</h1>
    <p>Ingrese su información y seleccione un candidato.</p>

    <label for="nombre">Nombre completo</label>
    <br />
    <input type="text" id="nombre" name="nombre" />
    <br />

    <label for="correo">Correo</label>
    <br />
    <input type="text" id="correo" name="correo" />
    <br />

    <label for="identificacion">Num. de Identificación</label>
    <br />
    <input type="text" id="identificacion" name="identificacion" />
    <br />

    <label for="telefono">Teléfono</label>
    <br />
    <input type="text" id="telefono" name="telefono" />
    <br /><br />

    <p>Seleccione un candidato:</p>

    <input type="radio" id="candidato1" name="candidato" value="1" />
    <label for="candidato1">Candidato #1</label>
    <br />

    <input type="radio" id="candidato2" name="candidato" value="2" />
    <label for="candidato2">Candidato #2</label>
    <br />

    <input type="radio" id="candidato3" name="candidato" value="3" />
    <label for="candidato3">Candidato #3</label>
    <br /><br />

    <button type="submit">Confirmar voto</button>
  </form>
</html>
